name: validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install validation dependencies
        run: python -m pip install -r plugins/student-presentation-suite/requirements.txt
      - name: Validate Slide Spec schema
        run: python -m json.tool plugins/student-presentation-suite/references/slide-spec.schema.json > /dev/null
      - name: Validate real Slide Spec fixture
        run: python plugins/student-presentation-suite/scripts/validate_slide_spec.py plugins/student-presentation-suite/examples/ai-learning-report.yaml --json
      - name: Run unit tests
        run: PYTHONPATH=plugins/student-presentation-suite python -m unittest discover -s plugins/student-presentation-suite/tests
      - name: Check script entrypoints
        run: |
          python plugins/student-presentation-suite/skills/student-presentation-review/scripts/pptx_static_check.py --help
          python plugins/student-presentation-suite/skills/student-presentation-ppt/scripts/pptx_delivery_check.py --help
          python plugins/student-presentation-suite/scripts/validate_slide_spec.py --help
          python plugins/student-presentation-suite/scripts/check_plugin_release.py --help
          python scripts/check_marketplace_release.py --help
      - name: Check plugin release structure
        run: python plugins/student-presentation-suite/scripts/check_plugin_release.py
      - name: Check marketplace release structure
        run: python scripts/check_marketplace_release.py
      - name: Download official Codex validators
        run: |
          curl -fsSL https://raw.githubusercontent.com/openai/codex/main/codex-rs/skills/src/assets/samples/plugin-creator/scripts/validate_plugin.py -o "$RUNNER_TEMP/validate_plugin.py"
          curl -fsSL https://raw.githubusercontent.com/openai/codex/main/codex-rs/skills/src/assets/samples/skill-creator/scripts/quick_validate.py -o "$RUNNER_TEMP/quick_validate.py"
      - name: Validate Codex plugin and skills
        run: |
          python "$RUNNER_TEMP/validate_plugin.py" plugins/student-presentation-suite
          python "$RUNNER_TEMP/quick_validate.py" plugins/student-presentation-suite/skills/student-presentation
          python "$RUNNER_TEMP/quick_validate.py" plugins/student-presentation-suite/skills/student-presentation-ppt
          python "$RUNNER_TEMP/quick_validate.py" plugins/student-presentation-suite/skills/student-presentation-review
      - name: Compile Python entrypoints
        run: |
          python -m py_compile \
            plugins/student-presentation-suite/scripts/check_plugin_release.py \
            plugins/student-presentation-suite/scripts/validate_slide_spec.py \
            plugins/student-presentation-suite/skills/student-presentation-ppt/scripts/pptx_delivery_check.py \
            plugins/student-presentation-suite/skills/student-presentation-review/scripts/pptx_static_check.py \
            scripts/check_marketplace_release.py
      - name: Check patch hygiene
        run: git diff --check
