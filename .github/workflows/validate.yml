name: validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install validation dependencies
        run: python -m pip install -r requirements.txt
      - name: Validate Slide Spec schema
        run: python -m json.tool references/slide-spec.schema.json > /dev/null
      - name: Run unit tests
        run: python -m unittest discover -s tests
      - name: Check script entrypoints
        run: |
          python skills/student-presentation-review/scripts/pptx_static_check.py --help
          python skills/student-presentation-ppt/scripts/pptx_delivery_check.py --help
          python scripts/validate_slide_spec.py --help
